name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

# Un PR que recibe varios pushes seguidos solo mantiene vivo el ultimo run:
# compilar los crates de FBW es caro y no interesa pagarlo por commits pisados.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: core (nativo)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (con el vendor de FBW pineado)
        uses: actions/checkout@v4
        with:
          # El submodulo de FBW pesa ~600 MB: shallow, y solo el commit pineado.
          submodules: recursive
          fetch-depth: 1

      # El toolchain sale de core-rs/rust-toolchain.toml (mismo pin que el
      # vendor). rustup lo instala solo en la primera invocacion de cargo.
      - name: Mostrar toolchain
        working-directory: core-rs
        run: cargo --version --verbose

      - name: Cache de cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core-rs

      # Guardia ejecutable de D-005: la asuncion estructural del proyecto es que
      # el grafo nativo NO arrastra msfs-rs, systems_wasm, a320_systems_wasm ni
      # wasm-bindgen. Un bump del pin del vendor es exactamente lo que podria
      # romperla, y sin esto el build empezaria a fallar senalando otra cosa.
      - name: Guardia del decoupling (D-005)
        working-directory: core-rs
        shell: bash
        run: |
          cargo tree --prefix none -e normal,build | tee tree.out >/dev/null
          if grep -E '^(msfs|systems_wasm|a320_systems_wasm|wasm-bindgen) ' tree.out; then
            echo "::error::el grafo de dependencias NATIVO arrastra crates de MSFS/WASM: es un bug de decoupling (ver D-005 en docs/decisiones.md), no un toolchain que falte"
            exit 1
          fi
          echo "grafo nativo limpio: sin msfs-rs / systems_wasm / a320_systems_wasm / wasm-bindgen"

      # Compilacion NATIVA siempre (la guardia de arriba lo hace ejecutable).
      - name: cargo check
        working-directory: core-rs
        run: cargo check --all-targets

      - name: cargo test
        working-directory: core-rs
        run: cargo test

      # Smoke test de verdad: corre la demo sobre api::Sim (main.rs, antes el
      # spike de Fase 0) y comprueba que el avion se instancia, simula y la red
      # electrica cobra vida al meter ext pwr. La demo imprime ON/off amigables.
      # En debug a proposito: simula ~4 s y asi reutiliza los artefactos de
      # check/test en vez de recompilar FBW entero en release.
      # `shell: bash` -> pipefail, si no el `tee` se traga un panic de la demo.
      - name: Smoke test de la demo
        working-directory: core-rs
        shell: bash
        run: |
          cargo run | tee demo.out
          grep -q '\[ext pwr ON\] *AC_1=ON' demo.out \
            || { echo "::error::el AC_1 bus no se alimento con ext pwr ON"; exit 1; }
          # Fase 2 (#14): el fallo del TR 1 debe RECONFIGURAR la red, no apagarla.
          # Se exige el par completo (TR_1 caido Y DC_1 vivo): si solo se mirase
          # el TR, una inyeccion que apagara media red pasaria por buena.
          grep -q '\[fail TR 1\] *AC_1=ON *DC_1=ON .*TR_1_OK=off' demo.out \
            || { echo "::error::el fallo del TR 1 no reconfiguro la red (se esperaba TR_1_OK=off con DC_1=ON via bus tie)"; exit 1; }
          grep -q '\[unfail TR 1\] .*TR_1_OK=ON' demo.out \
            || { echo "::error::limpiar el fallo del TR 1 no restauro su potencial normal"; exit 1; }
          # Fase 2 (#15): el bucle entero -- el fallo levanta su caution en la
          # ECAM, y limpiarlo la retira. Que la deteccion corra en CI es lo que
          # separa "el avion tiene fallos" de "el avion te dice que fallo".
          grep -q 'ECAM: CAUTION ELEC TR 1 FAULT' demo.out \
            || { echo "::error::el fallo del TR 1 no levanto su caution en la ECAM"; exit 1; }
          grep -q 'ECAM: clear' demo.out \
            || { echo "::error::la ECAM no volvio a estar limpia tras limpiar el fallo"; exit 1; }

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # El vendor hace falta aunque solo lintemos nuestro crate: `systems` y
          # `a320_systems` son path deps y clippy tiene que compilarlas.
          submodules: recursive
          fetch-depth: 1

      - name: Cache de cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core-rs

      - name: rustfmt
        working-directory: core-rs
        run: cargo fmt --check

      # Los warnings del codigo vendorizado de FBW no son nuestros y no se
      # arreglan: -D warnings aplica solo al crate local.
      - name: clippy
        working-directory: core-rs
        run: cargo clippy --all-targets -- -D warnings

  # Gate agregado: el UNICO status check que exige la proteccion de main.
  # Anadir/renombrar jobs solo requiere tocar `needs`, no la proteccion.
  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    needs: [core, lint]
    if: always()
    steps:
      - name: Comprobar que todos los jobs pasaron
        run: |
          echo "core: ${{ needs.core.result }}"
          echo "lint: ${{ needs.lint.result }}"
          if [ "${{ needs.core.result }}" != "success" ] || [ "${{ needs.lint.result }}" != "success" ]; then
            echo "::error::algun job del CI no paso"
            exit 1
          fi
