<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" role="img" aria-label="A320 Systems Twin — the real ECAM ELEC page with a TR 1 fault, headless failure-management benchmark for LLM agents">
  <defs>
    <linearGradient id="crt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10161f"/>
      <stop offset="1" stop-color="#0a0f16"/>
    </linearGradient>
  </defs>

  <!-- bezel + screen -->
  <rect x="0" y="0" width="880" height="300" rx="14" fill="#1c232e"/>
  <rect x="10" y="10" width="860" height="280" rx="8" fill="url(#crt)" stroke="#2b3646" stroke-width="1.5"/>

  <!-- faint scanlines -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
    <line x1="12" y1="40" x2="868" y2="40"/>
    <line x1="12" y1="70" x2="868" y2="70"/>
    <line x1="12" y1="100" x2="868" y2="100"/>
    <line x1="12" y1="130" x2="868" y2="130"/>
    <line x1="12" y1="160" x2="868" y2="160"/>
    <line x1="12" y1="190" x2="868" y2="190"/>
    <line x1="12" y1="220" x2="868" y2="220"/>
    <line x1="12" y1="250" x2="868" y2="250"/>
  </g>

  <!-- title block (left side) -->
  <g font-family="'Courier New',Consolas,monospace">
    <text x="48" y="96" fill="#38e07d" font-size="42" font-weight="bold" letter-spacing="2">A320 SYSTEMS</text>
    <text x="48" y="142" fill="#38e07d" font-size="42" font-weight="bold" letter-spacing="2">TWIN</text>
    <text x="48" y="176" fill="#7fd4ff" font-size="15">headless FlyByWire systems core</text>
    <text x="48" y="198" fill="#7fd4ff" font-size="15">CLI + MCP - a failure-management</text>
    <text x="48" y="220" fill="#7fd4ff" font-size="15">benchmark for LLM agents</text>
  </g>

  <!-- ECAM memo lines (left side, bottom) -->
  <g font-family="'Courier New',Consolas,monospace" font-size="13" font-weight="bold">
    <text x="48" y="246" fill="#f5b642">ELEC TR 1 FAULT</text>
    <text x="48" y="268" fill="#38e07d">AGENT: RUN QRH PROC . . .</text>
  </g>

  <!-- ===== real ECAM ELEC page (right side) ===== -->
  <g font-family="'Courier New',Consolas,monospace">
    <!-- page title -->
    <text x="392" y="30" fill="#e8edf4" font-size="14" font-weight="bold">ELEC</text>
    <line x1="392" y1="34" x2="428" y2="34" stroke="#e8edf4" stroke-width="1"/>

    <!-- feed lines (green = contactor closed, demo state: ext pwr, TR 1 failed) -->
    <g stroke="#38e07d" stroke-width="1.6" fill="none">
      <!-- BAT 1 / BAT 2 to DC BAT bus -->
      <path d="M538 41 H565"/>
      <path d="M702 41 H675"/>
      <!-- DC BAT bus down to DC ESS -->
      <path d="M620 52 V88"/>
      <!-- DC 1 refed from DC BAT (TR 1 lost), DC 2 feeds DC BAT -->
      <path d="M455 88 V66 H590 V52"/>
      <path d="M785 88 V66 H650 V52"/>
      <!-- AC 2 -> TR 2 -> DC 2 -->
      <path d="M785 210 V192"/>
      <path d="M785 146 V110"/>
      <!-- AC 1 -> TR 1 (TR 1 input still powered) -->
      <path d="M455 210 V192"/>
      <!-- AC 1 -> AC ESS -->
      <path d="M500 221 H575"/>
      <!-- EXT PWR up to the bus tie feeding AC 1 and AC 2 -->
      <path d="M657 246 V240 M455 240 H785 M455 240 V232 M785 240 V232"/>
    </g>
    <!-- TR 1 -> DC 1 branch lost (amber, broken) -->
    <path d="M455 146 V110" stroke="#f5b642" stroke-width="1.6" fill="none" stroke-dasharray="4 4"/>

    <!-- BAT row -->
    <g fill="none" stroke="#e8edf4" stroke-width="1.5">
      <rect x="468" y="24" width="70" height="34"/>
      <rect x="702" y="24" width="70" height="34"/>
    </g>
    <g text-anchor="middle" font-size="12" font-weight="bold">
      <text x="503" y="38" fill="#e8edf4">BAT 1</text>
      <text x="503" y="53" fill="#7fd4ff" font-size="11">28V 0A</text>
      <text x="737" y="38" fill="#e8edf4">BAT 2</text>
      <text x="737" y="53" fill="#7fd4ff" font-size="11">28V 0A</text>
    </g>
    <rect x="565" y="30" width="110" height="22" fill="none" stroke="#38e07d" stroke-width="2"/>
    <text x="620" y="46" fill="#38e07d" text-anchor="middle" font-size="13" font-weight="bold">DC BAT</text>

    <!-- DC row -->
    <g fill="none" stroke="#38e07d" stroke-width="2">
      <rect x="410" y="88" width="90" height="22"/>
      <rect x="575" y="88" width="90" height="22"/>
      <rect x="740" y="88" width="90" height="22"/>
    </g>
    <g fill="#38e07d" text-anchor="middle" font-size="13" font-weight="bold">
      <text x="455" y="104">DC 1</text>
      <text x="620" y="104">DC ESS</text>
      <text x="785" y="104">DC 2</text>
    </g>

    <!-- TR row -->
    <g fill="none" stroke-width="1.5">
      <rect x="415" y="146" width="80" height="46" stroke="#f5b642" stroke-width="2"/>
      <rect x="580" y="146" width="80" height="46" stroke="#e8edf4"/>
      <rect x="745" y="146" width="80" height="46" stroke="#e8edf4"/>
    </g>
    <g text-anchor="middle" font-size="12" font-weight="bold">
      <text x="455" y="163" fill="#f5b642">TR 1</text>
      <text x="455" y="181" fill="#f5b642" font-size="11">FAULT</text>
      <text x="620" y="163" fill="#e8edf4">ESS TR</text>
      <text x="620" y="181" fill="#7fd4ff" font-size="11">28V 0A</text>
      <text x="785" y="163" fill="#e8edf4">TR 2</text>
      <text x="785" y="181" fill="#7fd4ff" font-size="11">28V 60A</text>
    </g>

    <!-- AC row -->
    <g fill="none" stroke="#38e07d" stroke-width="2">
      <rect x="410" y="210" width="90" height="22"/>
      <rect x="575" y="210" width="90" height="22"/>
      <rect x="740" y="210" width="90" height="22"/>
    </g>
    <g fill="#38e07d" text-anchor="middle" font-size="13" font-weight="bold">
      <text x="455" y="226">AC 1</text>
      <text x="620" y="226">AC ESS</text>
      <text x="785" y="226">AC 2</text>
    </g>

    <!-- GEN row -->
    <g fill="none" stroke-width="1.5">
      <rect x="400" y="246" width="75" height="40" stroke="#e8edf4"/>
      <rect x="505" y="246" width="80" height="40" stroke="#e8edf4"/>
      <rect x="620" y="246" width="75" height="40" stroke="#38e07d" stroke-width="2"/>
      <rect x="730" y="246" width="75" height="40" stroke="#e8edf4"/>
    </g>
    <g text-anchor="middle" font-size="12" font-weight="bold">
      <text x="437" y="262" fill="#e8edf4">GEN 1</text>
      <text x="437" y="279" fill="#e8edf4" font-size="11">OFF</text>
      <text x="545" y="262" fill="#e8edf4">APU GEN</text>
      <text x="545" y="279" fill="#e8edf4" font-size="11">OFF</text>
      <text x="657" y="262" fill="#38e07d">EXT PWR</text>
      <text x="657" y="279" fill="#7fd4ff" font-size="11">115V 400HZ</text>
      <text x="767" y="262" fill="#e8edf4">GEN 2</text>
      <text x="767" y="279" fill="#e8edf4" font-size="11">OFF</text>
    </g>
  </g>
</svg>
