      - {id: FILTER_WPT,  type: pb, lights: ["ON"]}
      - {id: FILTER_VORD, type: pb, lights: ["ON"]}
      - {id: FILTER_NDB,  type: pb, lights: ["ON"]}
      - {id: FILTER_ARPT, type: pb, lights: ["ON"]}
      - {id: ADF_VOR_1,   type: sw, pos: [ADF, "OFF", VOR], def: "OFF"}
      - {id: ADF_VOR_2,   type: sw, pos: [ADF, "OFF", VOR], def: "OFF"}

