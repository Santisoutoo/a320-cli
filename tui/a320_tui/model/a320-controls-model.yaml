      - {id: STBY_COMPASS, type: sw, pos: ["ON", "OFF"], def: "OFF"}
      - {id: INTEG_LT,   type: knob}
      - {id: OVHD_INTEG_LT, type: knob}

  # ----------------------------------------------------------
  glareshield:

    fcu:
      - {id: SPD_MACH_KNOB, type: knob_pp, range: [100, 399], note: "en Mach 0.10-0.99"}
      - {id: SPD_MACH_PB,   type: pb_mom, note: "alterna SPD <-> MACH"}
      - {id: HDG_KNOB,      type: knob_pp, range: [0, 359]}
      - {id: HDG_VS_TRK_FPA_PB, type: pb_mom, note: "alterna HDG-V/S <-> TRK-FPA"}
