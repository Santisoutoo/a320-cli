      - {id: VS_FPA_KNOB,   type: knob_pp, range: [-6000, 6000], note: "push = level off"}
      - {id: AP1,   type: pb, lights: ["ON"]}
      - {id: AP2,   type: pb, lights: ["ON"]}
      - {id: A_THR, type: pb, lights: ["ON"]}
      - {id: EXPED, type: pb, lights: ["ON"]}
      - {id: APPR,  type: pb, lights: ["ON"]}
