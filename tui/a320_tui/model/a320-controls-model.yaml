      - {id: VHF2, type: pb, lights: [SEL_GREEN]}
      - {id: VHF3, type: pb, lights: [SEL_GREEN]}
      - {id: HF1,  type: pb, lights: [SEL_GREEN]}
      - {id: HF2,  type: pb, lights: [SEL_GREEN]}
