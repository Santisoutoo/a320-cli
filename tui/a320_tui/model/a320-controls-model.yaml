      - {id: TEMP_FWD_CAB, type: knob, range: [18, 30]}
      - {id: TEMP_AFT_CAB, type: knob, range: [18, 30]}
      - {id: HOT_AIR,    type: pb, lights: [FAULT, "OFF"]}
      - {id: ENG1_BLEED, type: pb, lights: [FAULT, "OFF"]}
      - {id: ENG2_BLEED, type: pb, lights: [FAULT, "OFF"]}
