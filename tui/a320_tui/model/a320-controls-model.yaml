# ============================================================
# A320 — Modelo de controles por panel (para TUI / sim de sistemas)
# Convenciones Airbus:
#   - Filosofía "lights out": en vuelo normal ningún korry iluminado
#   - Colores luces: FAULT=ambar, "OFF"/alerta blanca=blanco,
#     "ON"/"AVAIL"/"DECEL"=azul/verde, FIRE=rojo
#   - pb con "OFF" blanco: pulsado = fuera de auto (luz OFF encendida)
# ============================================================

types:
  pb:        "Korry pushbutton latched: {pressed: bool, lights: {<n>: bool}}"
  pb_mom:    "Pushbutton momentáneo (spring-loaded)"
  pb_guard:  "Korry con guarda roja: {guard_open: bool, pressed: bool, lights}"
  fire_pb:   "Fire pushbutton: {popped_out: bool, light_FIRE: bool}"
  sel:       "Selector rotatorio N posiciones: {pos: str}"
  knob:      "Rotatorio continuo: {value: float 0..1 o rango}"
  knob_pp:   "Knob FCU push/pull: {value, managed: bool}  (push=managed, pull=selected)"
  sw:        "Toggle/switch 2-3 posiciones: {pos: str}"
  lever:     "Palanca con detents: {pos: str|float}"
  wheel:     "Continuo bidireccional: {value: float}"
  light:     "Solo anunciador, no accionable: {on: bool}"
  gauge:     "Solo indicación analógica: {value}"

# ============================================================
panels:

  # ----------------------------------------------------------
  overhead_aft:
    circuit_breakers:
      - {id: CB_ARRAY, type: sw, note: "matriz de C/Bs monitorizados; cada uno {pulled: bool}"}
    maintenance:
      - {id: ENG1_FADEC_GND_PWR, type: pb, lights: ["ON"]}
      - {id: ENG2_FADEC_GND_PWR, type: pb, lights: ["ON"]}
      - {id: BLUE_PUMP_OVRD,     type: pb_guard, lights: ["ON"]}
      - {id: HYD_LEAK_VLV_G,     type: pb_guard, lights: ["OFF"]}
      - {id: HYD_LEAK_VLV_B,     type: pb_guard, lights: ["OFF"]}
      - {id: HYD_LEAK_VLV_Y,     type: pb_guard, lights: ["OFF"]}
      - {id: SVCE_INT_OVRD,      type: pb, lights: ["ON"]}
      - {id: OXY_TMR_RESET,      type: pb_mom}
      - {id: AVIONICS_COMP_LT,   type: sw, pos: ["ON", "OFF"], def: "OFF"}
    elt:
      - {id: ELT, type: sw, pos: ["ARM", "ON", "TEST_RESET"], def: "ARM"}
    lights:
      - {id: READING_LT_CAPT, type: knob}
      - {id: READING_LT_FO,   type: knob}
      - {id: DOME_LT,         type: sw, pos: ["BRT", "DIM", "OFF"], def: "OFF"}

